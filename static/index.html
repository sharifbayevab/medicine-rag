<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UzMAX</title>
    <style>
        :root {
            --bg-top: #f6fbff;
            --bg-bottom: #e6f2f7;
            --panel: rgba(255, 255, 255, 0.78);
            --panel-strong: rgba(255, 255, 255, 0.92);
            --border: rgba(15, 23, 42, 0.08);
            --text: #183042;
            --muted: #678196;
            --brand: #0c8f8a;
            --brand-2: #1a73e8;
            --danger: #e45858;
            --success: #1b9c74;
            --shadow: 0 18px 45px rgba(31, 41, 55, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", sans-serif;
            color: var(--text);
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(26, 115, 232, 0.10), transparent 28%),
                radial-gradient(circle at top right, rgba(12, 143, 138, 0.12), transparent 30%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            filter: blur(12px);
            opacity: 0.28;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            top: -80px;
            left: -60px;
            background: rgba(26, 115, 232, 0.22);
        }

        body::after {
            right: -60px;
            bottom: -90px;
            background: rgba(12, 143, 138, 0.24);
        }

        body.tablet-mode {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .app-shell {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100vh;
            height: 100dvh;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        body.tablet-mode .app-shell {
            width: min(100%, 1088px);
            height: min(calc(100dvh - 24px), 680px);
            min-height: 0;
            max-height: 680px;
            padding: 14px;
            border-radius: 34px;
            background: rgba(255, 255, 255, 0.26);
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
        }

        body.tablet-mode #header {
            padding: 10px 14px;
            border-radius: 24px;
        }

        body.tablet-mode #title {
            font-size: 1.12rem;
        }

        body.tablet-mode #subtitle {
            display: none;
        }

        body.tablet-mode .header-controls {
            gap: 8px;
        }

        body.tablet-mode .toggle-group,
        body.tablet-mode .lang-group {
            padding: 8px 10px;
            font-size: 0.75rem;
        }

        body.tablet-mode #camera-panel .panel-head {
            display: none;
        }

        #header,
        .panel,
        #controls {
            background: var(--panel);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        #header {
            border-radius: 26px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #title {
            font-size: clamp(1.35rem, 1.1rem + 1vw, 2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        #subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle-group,
        .lang-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(15, 23, 42, 0.05);
            color: var(--muted);
            font-size: 0.84rem;
            white-space: nowrap;
        }

        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
            cursor: pointer;
        }

        .toggle input { opacity: 0; width: 0; height: 0; }

        .toggle .slider {
            position: absolute;
            inset: 0;
            background: rgba(148, 163, 184, 0.55);
            border-radius: 999px;
            transition: background 0.2s ease;
        }

        .toggle .slider::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 2px;
            top: 2px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.16);
            transition: transform 0.2s ease;
        }

        .toggle input:checked + .slider {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
        }

        .toggle input:checked + .slider::before {
            transform: translateX(18px);
        }

        select {
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-weight: 600;
            font-size: 0.92rem;
        }

        #main-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr) 320px;
            grid-template-rows: minmax(0, 1fr);
            gap: 16px;
            min-height: 0;
            overflow: hidden;
        }

        .panel {
            border-radius: 28px;
            overflow: hidden;
            min-height: 0;
            height: 100%;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 18px 20px 14px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        }

        .panel-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .panel-note {
            color: var(--muted);
            font-size: 0.8rem;
        }

        #camera-panel {
            display: flex;
            flex-direction: column;
        }

        #camera-widget {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        .person-card {
            padding: 10px 12px;
            border-radius: 18px;
            background:
                linear-gradient(145deg, rgba(10, 35, 66, 0.96), rgba(16, 73, 78, 0.92));
            color: rgba(255, 255, 255, 0.95);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .person-label {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(191, 219, 254, 0.78);
        }

        .person-name {
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .person-meta {
            color: rgba(226, 232, 240, 0.82);
            font-size: 0.74rem;
            line-height: 1.35;
        }

        .person-pill {
            align-self: flex-start;
            margin-top: 2px;
            padding: 5px 8px;
            border-radius: 999px;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            background: rgba(148, 163, 184, 0.2);
            color: rgba(226, 232, 240, 0.9);
        }

        .person-pill.known {
            background: rgba(34, 197, 94, 0.18);
            color: #bbf7d0;
        }

        .person-pill.pending {
            background: rgba(250, 204, 21, 0.18);
            color: #fde68a;
        }

        .voice-hero {
            position: relative;
            min-height: 174px;
            border-radius: 24px;
            overflow: hidden;
            background:
                radial-gradient(circle at 35% 35%, rgba(137, 207, 255, 0.35), transparent 28%),
                radial-gradient(circle at 65% 70%, rgba(52, 211, 153, 0.25), transparent 35%),
                linear-gradient(145deg, #0a2342, #0f3b4f 58%, #12526a);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .voice-hero::before,
        .voice-hero::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            inset: 50%;
            transform: translate(-50%, -50%);
        }

        .voice-hero::before {
            width: 124px;
            height: 124px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.85), rgba(96, 165, 250, 0.42) 42%, rgba(96, 165, 250, 0.02) 70%);
            filter: blur(2px);
            animation: hero-breathe 3.8s ease-in-out infinite;
        }

        .voice-hero::after {
            width: 220px;
            height: 220px;
            border: 1px solid rgba(186, 230, 253, 0.24);
            animation: hero-ring 3.6s ease-out infinite;
        }

        .voice-ring {
            position: absolute;
            inset: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(191, 219, 254, 0.18);
        }

        .voice-ring.one {
            width: 166px;
            height: 166px;
            animation: hero-ring 3.2s ease-out infinite 0.25s;
        }

        .voice-ring.two {
            width: 196px;
            height: 196px;
            animation: hero-ring 3.2s ease-out infinite 0.7s;
        }

        .voice-lines {
            position: absolute;
            left: 24px;
            right: 24px;
            bottom: 24px;
            height: 42px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 6px;
        }

        .voice-lines span {
            width: 7px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(110, 231, 183, 0.65));
            animation: hero-wave 1.2s ease-in-out infinite;
            transform-origin: center bottom;
        }

        .voice-lines span:nth-child(1) { height: 16px; animation-delay: 0s; }
        .voice-lines span:nth-child(2) { height: 28px; animation-delay: 0.08s; }
        .voice-lines span:nth-child(3) { height: 34px; animation-delay: 0.16s; }
        .voice-lines span:nth-child(4) { height: 20px; animation-delay: 0.24s; }
        .voice-lines span:nth-child(5) { height: 38px; animation-delay: 0.32s; }
        .voice-lines span:nth-child(6) { height: 24px; animation-delay: 0.4s; }
        .voice-lines span:nth-child(7) { height: 30px; animation-delay: 0.48s; }

        .camera-stage {
            position: relative;
            flex: 1;
            min-height: 0;
            border-radius: 24px;
            overflow: hidden;
            background:
                linear-gradient(160deg, rgba(9, 38, 68, 0.96), rgba(16, 73, 78, 0.92));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .camera-stage::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.10));
            pointer-events: none;
        }

        #face-video,
        #face-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #face-video {
            position: absolute;
            inset: 0;
            object-fit: cover;
            transform: scaleX(-1);
            background: #07121d;
        }

        #face-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            transform: scaleX(-1);
            background: transparent;
        }

        #camera-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            color: rgba(255, 255, 255, 0.88);
            font-size: 0.94rem;
            line-height: 1.45;
            transition: opacity 0.25s ease;
        }

        #camera-widget.active #camera-placeholder {
            opacity: 0;
            pointer-events: none;
        }

        .camera-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            min-height: 20px;
        }

        .camera-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.16);
            color: var(--muted);
            font-weight: 700;
            font-size: 0.8rem;
        }

        .camera-badge.detected {
            background: rgba(27, 156, 116, 0.14);
            color: var(--success);
        }

        #camera-help {
            color: var(--muted);
            font-size: 0.76rem;
            line-height: 1.35;
        }

        #chat-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 100%;
            overflow: hidden;
        }

        #voice-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 100%;
            overflow: hidden;
        }

        #chat-container {
            flex: 1;
            min-height: 0;
            max-height: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 18px 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
        }

        .message {
            max-width: min(78%, 780px);
            padding: 14px 16px;
            border-radius: 22px;
            line-height: 1.55;
            font-size: 0.97rem;
            word-wrap: break-word;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
        }

        .assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.94);
            color: var(--text);
            border-bottom-left-radius: 8px;
        }

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--brand-2), #34a0ff);
            color: #fff;
            border-bottom-right-radius: 8px;
        }

        #controls {
            flex: 1;
            border-radius: 0;
            padding: 18px 20px 22px;
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            gap: 16px;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: none;
        }

        .controls-copy {
            min-width: 0;
            text-align: center;
        }

        #status {
            min-height: 1.3em;
            color: var(--text);
            font-weight: 700;
            font-size: 0.95rem;
        }

        #status.muted {
            color: var(--muted);
            font-weight: 600;
        }

        #mic-hint {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.86rem;
            line-height: 1.45;
        }

        .mic-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .control-voice {
            width: min(320px, 78vw);
            min-height: 132px;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            display: none;
        }

        .control-voice:hover {
            transform: translateY(-1px);
        }

        .control-voice.active {
            display: block;
        }

        .control-voice .voice-lines {
            bottom: 28px;
        }

        .control-voice.listening {
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.06),
                0 18px 36px rgba(27, 156, 116, 0.24);
        }

        .control-voice.speaking {
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.06),
                0 18px 36px rgba(26, 115, 232, 0.24);
        }

        .control-voice.idle {
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.06),
                0 18px 36px rgba(12, 143, 138, 0.18);
        }

        #mic-button {
            width: 94px;
            height: 94px;
            border: none;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #ff7d66, var(--danger));
            box-shadow:
                0 18px 30px rgba(228, 88, 88, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
            transition: transform 0.18s ease, box-shadow 0.2s ease, background 0.2s ease;
            overflow: hidden;
        }

        #mic-button.hidden {
            display: none;
        }

        #mic-button:hover {
            transform: translateY(-1px);
        }

        #mic-button:active {
            transform: scale(0.96);
        }

        #mic-button svg {
            width: 34px;
            height: 34px;
            fill: #fff;
            position: relative;
            z-index: 2;
        }

        .mic-glow {
            position: absolute;
            inset: 14px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.22), transparent 68%);
            z-index: 1;
        }

        .mic-waves {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1;
        }

        .wave-bar {
            width: 4px;
            height: 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.8);
            transform-origin: center bottom;
        }

        #mic-button.listening,
        #mic-button.live-connected.listening {
            background: linear-gradient(160deg, #1db67f, var(--success));
            box-shadow:
                0 18px 30px rgba(27, 156, 116, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }

        #mic-button.live-connected {
            background: linear-gradient(160deg, #20b79b, var(--brand));
            box-shadow:
                0 18px 30px rgba(12, 143, 138, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }

        #mic-button.agent-speaking,
        #mic-button.live-connected.agent-speaking {
            background: linear-gradient(160deg, #4f8fff, var(--brand-2));
            box-shadow:
                0 18px 30px rgba(26, 115, 232, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }

        #mic-button.listening .mic-waves,
        #mic-button.agent-speaking .mic-waves {
            opacity: 1;
        }

        #mic-button.listening .wave-bar,
        #mic-button.agent-speaking .wave-bar {
            animation: wave-rise 0.95s ease-in-out infinite;
        }

        #mic-button .wave-bar:nth-child(1) { animation-delay: 0s; }
        #mic-button .wave-bar:nth-child(2) { animation-delay: 0.08s; }
        #mic-button .wave-bar:nth-child(3) { animation-delay: 0.16s; }
        #mic-button .wave-bar:nth-child(4) { animation-delay: 0.24s; }
        #mic-button .wave-bar:nth-child(5) { animation-delay: 0.32s; }

        @keyframes wave-rise {
            0%, 100% { transform: scaleY(0.45); opacity: 0.55; }
            50% { transform: scaleY(1.55); opacity: 1; }
        }

        @keyframes hero-breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
        }

        @keyframes hero-ring {
            0% { transform: translate(-50%, -50%) scale(0.82); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(1.14); opacity: 0; }
        }

        @keyframes hero-wave {
            0%, 100% { transform: scaleY(0.7); opacity: 0.55; }
            50% { transform: scaleY(1.4); opacity: 1; }
        }

        #volume-bar-wrap {
            justify-self: center;
            width: 100%;
            max-width: 220px;
            height: 10px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.20);
            overflow: hidden;
            opacity: 0.35;
            transition: opacity 0.25s ease;
        }

        #volume-bar-wrap.active {
            opacity: 1;
        }

        #volume-bar {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: linear-gradient(90deg, #34d399, #1a73e8);
            transition: width 0.08s linear;
        }

        body.hide-chat #main-layout {
            grid-template-columns: minmax(0, 1fr) 320px;
        }

        body.hide-chat #chat-panel {
            display: none;
        }

        body.hide-chat #voice-panel .panel-head {
            padding: 14px 16px 10px;
        }

        body.hide-chat #controls {
            padding: 14px 14px 16px;
            gap: 12px;
        }

        body.hide-chat .control-voice {
            width: min(240px, 74vw);
            min-height: 108px;
        }

        body.hide-chat .control-voice .voice-lines {
            left: 20px;
            right: 20px;
            bottom: 20px;
            height: 30px;
            gap: 5px;
        }

        body.hide-chat .control-voice .voice-lines span {
            width: 6px;
        }

        body.hide-chat #mic-button {
            width: 78px;
            height: 78px;
        }

        body.hide-chat #mic-button svg {
            width: 28px;
            height: 28px;
        }

        body.hide-chat #volume-bar-wrap {
            max-width: 180px;
        }

        body.hide-chat #status {
            font-size: 0.88rem;
        }

        body.hide-chat #mic-hint {
            font-size: 0.78rem;
        }

        @media (max-width: 1040px) {
            #main-layout {
                grid-template-columns: 1fr;
            }

            #camera-panel {
                order: 1;
            }

            #chat-panel {
                order: 2;
                min-height: 38vh;
            }

            #voice-panel {
                order: 3;
                min-height: 260px;
            }

            body.hide-chat #main-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 760px) {
            .app-shell {
                padding: 12px;
                gap: 12px;
            }

            #header {
                padding: 14px;
                border-radius: 22px;
            }

            #controls {
                grid-template-columns: 1fr;
                justify-items: center;
                text-align: center;
            }

        .controls-copy {
            order: 1;
        }

        .mic-center {
            order: 2;
            width: 100%;
        }

            #volume-bar-wrap {
                order: 3;
                justify-self: center;
                width: 100%;
                max-width: 240px;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <header id="header">
        <div class="brand">
            <div id="title">UzMAX</div>
            <div id="subtitle"></div>
        </div>
        <div class="header-controls">
            <div class="toggle-group">
                <span id="label-live"></span>
                <label class="toggle">
                    <input type="checkbox" id="toggle-live">

//  AudioWorklet: capture + noise gate + RMS
// ═══════════════════════════════════════════
const workletCode = `
class PcmCaptureProcessor extends AudioWorkletProcessor {
    constructor() {
        super();
        this._buf = [];
        this._len = 0;
        this._target = 4096;
        this._noiseFloor = 0.005;
        this._noiseAlpha = 0.995;
    }
    process(inputs) {
        const ch = inputs[0] && inputs[0][0];
        if (!ch) return true;
        this._buf.push(new Float32Array(ch));
        this._len += ch.length;
        if (this._len < this._target) return true;

        const merged = new Float32Array(this._len);
        let off = 0;
        for (const b of this._buf) { merged.set(b, off); off += b.length; }
        this._buf = [];
        this._len = 0;

        let sum = 0;
        for (let i = 0; i < merged.length; i++) sum += merged[i] * merged[i];
        const rms = Math.sqrt(sum / merged.length);

        if (rms < this._noiseFloor * 2.0) {
            this._noiseFloor = this._noiseFloor * this._noiseAlpha + rms * (1 - this._noiseAlpha);
        }
        const isSpeech = rms > Math.max(this._noiseFloor * 3.0, 0.006);

        const pcm = new Int16Array(merged.length);
        for (let i = 0; i < merged.length; i++) {
            pcm[i] = Math.max(-1, Math.min(1, merged[i])) * 0x7FFF;
        }

        this.port.postMessage({ pcm: pcm.buffer, rms, isSpeech }, [pcm.buffer]);
        return true;
    }
}
registerProcessor('pcm-capture', PcmCaptureProcessor);
`;
const workletBlob = new Blob([workletCode], { type: 'application/javascript' });
const workletUrl = URL.createObjectURL(workletBlob);

function animateVoiceVisualTo(targetLevel) {
    const next = Math.max(0, Math.min(1, targetLevel));
    if (voiceVisualFrame) cancelAnimationFrame(voiceVisualFrame);

    const tick = () => {
        const delta = next - voiceVisualLevel;
        if (Math.abs(delta) < 0.02) {
            voiceVisualLevel = next;
        } else {
            voiceVisualLevel += delta * 0.22;
        }

        liveVoiceBars.forEach((bar, index) => {
            const factor = 0.55 + ((index % 4) * 0.12);
            const scale = 0.72 + voiceVisualLevel * (0.7 + factor);
            bar.style.transform = `scaleY(${scale.toFixed(3)})`;
            bar.style.opacity = `${Math.min(1, 0.45 + voiceVisualLevel * 0.7)}`;
        });

        micWaveBars.forEach((bar, index) => {
            const factor = 0.5 + (index * 0.15);
            const scale = 0.7 + voiceVisualLevel * (0.9 + factor);
            bar.style.transform = `scaleY(${scale.toFixed(3)})`;
            bar.style.opacity = `${Math.min(1, 0.42 + voiceVisualLevel * 0.7)}`;
        });

        if (Math.abs(next - voiceVisualLevel) >= 0.02) {
            voiceVisualFrame = requestAnimationFrame(tick);
        } else {
            voiceVisualFrame = null;
        }
    };

    voiceVisualFrame = requestAnimationFrame(tick);
}

async function startFaceDetection() {
    if (faceLoopActive) return;
    try {
        await ensurePlaybackReady();
        faceStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'user',
                width: { ideal: 640 },
                height: { ideal: 480 }

            audio: false
        });
        faceVideo.srcObject = faceStream;
        await faceVideo.play();
        cameraWidget.classList.add('active');
        faceLoopActive = true;
        faceGreetingSent = false;
        detectFaces();
    } catch (e) {
        console.error('Face detection init error', e);
        faceDetectEnabled = false;
        toggleFaceDetect.checked = false;
        setStatusKey('noCameraAccess');
    }
}

async function stopFaceDetection() {

    setFaceStatus(false);
    updatePersonCard();
    cameraWidget.classList.remove('active');

    if (faceStream) {
        faceStream.getTracks().forEach((track) => track.stop());
        faceStream = null;
    }
    faceVideo.srcObject = null;
    faceCtx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);

    if (micOpen) {
        stopListening();
        closeMic();
    }
}

function captureCurrentFrameDataUrl() {
    const width = faceVideo.videoWidth || 640;
    const height = faceVideo.videoHeight || 480;
    if (!width || !height) return null;

    frameCaptureCanvas.width = width;
    frameCaptureCanvas.height = height;
    frameCaptureCtx.drawImage(faceVideo, 0, 0, width, height);
    return frameCaptureCanvas.toDataURL('image/jpeg', 0.82);
}

async function analyzeCurrentFrameOnServer() {
    if (frameAnalyzeInFlight) return [];
    const frame = captureCurrentFrameDataUrl();
    if (!frame) return [];

    frameAnalyzeInFlight = true;
    try {
        const resp = await fetch('/api/frame/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ frame, max_faces: 5 })
        });
        if (!resp.ok) return [];
        const data = await resp.json();
        return data.faces || [];
    } catch (e) {
        console.error('Frame analyze error', e);
        return [];
    } finally {
        frameAnalyzeInFlight = false;
    }
}

function resetFaceCollection() {
    faceIdentityLocked = false;
    faceCollecting = false;
    faceCollectStartedAt = 0;
    faceCollectSamples = [];
}

function addFaceCollectSample(result) {
    if (!result) return;
    faceCollectSamples.push(result);
}

function chooseCollectedFaceIdentity() {
    if (!faceCollectSamples.length) return null;

    const knownBuckets = new Map();
    const unknownSamples = [];

    for (const sample of faceCollectSamples) {
        if (sample?.status === 'known' && sample.person?.person_id) {
            const key = sample.person.person_id;
            const bucket = knownBuckets.get(key) || { count: 0, bestScore: -1, bestSample: sample };
            bucket.count += 1;
            const score = Number.isFinite(sample.score) ? sample.score : -1;
            if (score > bucket.bestScore) {
                bucket.bestScore = score;
                bucket.bestSample = sample;
            }
            knownBuckets.set(key, bucket);
        } else if (sample?.status === 'unknown') {
            unknownSamples.push(sample);
        }
    }

    if (knownBuckets.size) {
        return Array.from(knownBuckets.values())
            .sort((a, b) => {
                if (b.count !== a.count) return b.count - a.count;
                return b.bestScore - a.bestScore;
            })[0].bestSample;
    }

    return unknownSamples[unknownSamples.length - 1] || faceCollectSamples[faceCollectSamples.length - 1];
}

function notifyFaceIdentity(result) {
    if (!ws || ws.readyState !== WebSocket.OPEN || !result) return;

    if (result.status === 'known' && result.person) {
        if (activeKnownPersonId === result.person.person_id && !pendingUnknownFace) return;
        activeKnownPersonId = result.person.person_id;
        pendingUnknownFace = false;
        identifiedPerson = result;
        updatePersonCard();
        ws.send(JSON.stringify({
            type: 'face_identity',
            person: result.person,
            pending_registration: null
        }));
        return;
    }

    if (result.status === 'unknown') {
        if (pendingUnknownFace) return;
        activeKnownPersonId = null;
        pendingUnknownFace = true;
        identifiedPerson = { status: 'unknown' };
        updatePersonCard();
        ws.send(JSON.stringify({
            type: 'face_identity',
            person: null,
            pending_registration: {
                embedding: result.embedding,
                snapshot_path: result.snapshot_path
            }
        }));
    }
}

async function handleFaceAppeared() {
    lastFaceSeenAt = Date.now();
    if (!facePresent) {
        setFaceStatus(true);
    }

    if (!micOpen) {
        const ok = await openMic();
        if (!ok) return;
    }
}

async function ensurePlaybackReady() {
    try {
        if (!playCtx || playCtx.state === 'closed') {
            playCtx = new AudioContext({ sampleRate: 48000 });
        }
        if (playCtx.state === 'suspended') {
            await playCtx.resume();
        }
    } catch (e) {
        console.error('Playback unlock error', e);
    }
}

function handleFaceMissing() {
    if (!facePresent) return;
    const hadLockedIdentity = faceIdentityLocked || !!identifiedPerson || pendingUnknownFace || !!activeKnownPersonId;
    setFaceStatus(false);
    faceGreetingSent = false;
    resetFaceCollection();
    activeKnownPersonId = null;
    pendingUnknownFace = false;
    identifiedPerson = null;
    updatePersonCard();
    if (hadLockedIdentity && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'face_missing' }));
    }
    if (micOpen) {
        stopListening();
        closeMic();
    }
}

async function detectFaces() {
    if (!faceLoopActive || !faceVideo.srcObject) return;

    faceCanvas.width = faceVideo.videoWidth || 640;
    faceCanvas.height = faceVideo.videoHeight || 480;

    try {
        const faces = await analyzeCurrentFrameOnServer();
        const hasFace = faces.length > 0;
        const wasFacePresent = facePresent;

        faceCtx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);
        if (hasFace) {
            lastDetectedFaceCount = faces.length;
            setFaceStatus(true);
            for (const item of faces) {
                const [x, y, w, h] = item.box;
                faceCtx.lineWidth = 3;
                faceCtx.strokeStyle = '#34d399';
                faceCtx.strokeRect(x, y, w, h);
            }
            lastFaceSeenAt = Date.now();

            if (!wasFacePresent) {
                resetFaceCollection();
                faceCollecting = true;
                faceCollectStartedAt = Date.now();
            }

            if (!faceIdentityLocked) {
                addFaceCollectSample(faces[0]);

                if (faceCollecting && Date.now() - faceCollectStartedAt >= FACE_COLLECT_MS) {
                    const lockedIdentity = chooseCollectedFaceIdentity();
                    if (lockedIdentity) {
                        notifyFaceIdentity(lockedIdentity);
                        await handleFaceAppeared();
                        faceIdentityLocked = true;
                    }
                    faceCollecting = false;
                    faceCollectStartedAt = 0;
                    faceCollectSamples = [];
                }
            }
        } else if (facePresent && Date.now() - lastFaceSeenAt > FACE_ABSENCE_MS) {
            lastDetectedFaceCount = 0;
            handleFaceMissing();
        }
    } catch (e) {
        console.error('Face detect loop error', e);
    }

    if (faceLoopActive) {
        setTimeout(() => requestAnimationFrame(detectFaces), FACE_ANALYZE_INTERVAL_MS);
    }
}

// ═══════════════════════════════════════════
//  WebSocket
// ═══════════════════════════════════════════
function initWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/chat`);

    ws.onopen = () => {
        reconnectN = 0;
        ws.send(JSON.stringify({ type: 'set_language', lang: langSelect.value }));
        sendSettings();
    };

    ws.onmessage = (ev) => {
        const d = JSON.parse(ev.data);
        handleServerMsg(d);
    };

    ws.onclose = () => {
        if (reconnectN < 10) {
            const delay = Math.min(1000 * Math.pow(1.5, reconnectN), 10000);
            reconnectN++;
            setTimeout(initWS, delay);
        }
    };

    ws.onerror = (e) => console.error('WS error', e);
}

function handleServerMsg(d) {
    switch (d.type) {
        case 'stt_partial':
            setRawStatus(d.text);
            break;

        case 'stt_final':
            addMessage(d.text, 'user');
            setStatusKey('thinking');
            break;

        case 'response_started':
            activeResponseId = d.response_id;
            playbackMuted = false;
            break;

        case 'llm_partial':
            if (d.response_id !== activeResponseId) break;
            appendAssistant(d.text);
            break;

        case 'tts_chunk':
            if (playbackMuted) break;
            if (d.response_id !== activeResponseId) break;
            isAgentSpeaking = true;
            updateButtonState();
            setStatusKey('speaking');
            playAudioChunk(d.audio);
            break;

        case 'tts_end':
            if (d.response_id !== activeResponseId) break;
            isAgentSpeaking = false;
            currentAssistantMsg = null;
            setRawStatus('');
            animateVoiceVisualTo(micOpen ? 0.12 : 0);
            updateButtonState();
            break;

        case 'interrupt':
            stopPlayback();
            isAgentSpeaking = false;
            activeResponseId = null;
            currentAssistantMsg = null;
            setRawStatus('');
            animateVoiceVisualTo(micOpen ? 0.12 : 0);
            updateButtonState();
            break;

        case 'ready_to_listen':
            if (liveMode && micOpen) {
                startListening();
            }
            break;
    }
}

// ═══════════════════════════════════════════
//  Chat UI
// ═══════════════════════════════════════════
function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    if (role === 'assistant') currentAssistantMsg = div;
}

function appendAssistant(text) {
    if (!currentAssistantMsg || currentAssistantMsg.classList.contains('user')) {
        addMessage(text, 'assistant');
    } else {
        currentAssistantMsg.textContent += text;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}

// ═══════════════════════════════════════════
//  Audio playback
// ═══════════════════════════════════════════
function stopPlayback() {
    nextPlayTime = 0;
    playbackMuted = true;
    animateVoiceVisualTo(0.12);
    if (playCtx) {
        playCtx.suspend().catch(() => {});
    }
}

async function playAudioChunk(base64Audio) {
    try {
        await ensurePlaybackReady();
        if (!playCtx) return;
        const binary = atob(base64Audio);
        let buf = new ArrayBuffer(binary.length);
        const bytes = new Uint8Array(buf);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        if (buf.byteLength % 2 !== 0) buf = buf.slice(0, buf.byteLength - 1);
        if (buf.byteLength === 0) return;

        const samples = new Int16Array(buf);
        const ab = playCtx.createBuffer(1, samples.length, 48000);
        const ch = ab.getChannelData(0);
        for (let i = 0; i < samples.length; i++) ch[i] = samples[i] / 32768.0;

        const src = playCtx.createBufferSource();
        src.buffer = ab;
        src.connect(playCtx.destination);
        const t = Math.max(playCtx.currentTime, nextPlayTime);
        src.start(t);
        nextPlayTime = t + ab.duration;
    } catch (e) {
        console.error('Playback error:', e);
    }
}

// ═══════════════════════════════════════════
//  Mic open / close
// ═══════════════════════════════════════════
async function openMic() {
    if (micOpen) return true;
    try {
        captureStream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
            }
        });
    } catch (e) {
        setStatusKey('noMicAccess');
        return false;
    }

    captureCtx = new AudioContext({ sampleRate: 16000 });
    await captureCtx.audioWorklet.addModule(workletUrl);

    const src = captureCtx.createMediaStreamSource(captureStream);
    hpFilter = captureCtx.createBiquadFilter();
    hpFilter.type = 'highpass';
    hpFilter.frequency.value = 85;
    hpFilter.Q.value = 0.7;

    workletNode = new AudioWorkletNode(captureCtx, 'pcm-capture');
    workletNode.port.onmessage = (e) => onAudioChunk(e.data);

    src.connect(hpFilter);
    hpFilter.connect(workletNode);
    workletNode.connect(captureCtx.destination);

    micOpen = true;
    volWrap.classList.add('active');
    return true;
}

function closeMic() {
    micOpen = false;
    isListening = false;
    sttRunning = false;
    speechStartSent = false;
    hasSpeech = false;
    silenceStart = 0;
    volWrap.classList.remove('active');
    volBar.style.width = '0%';
    animateVoiceVisualTo(0);

    if (captureStream) {
        captureStream.getTracks().forEach((t) => t.stop());
        captureStream = null;
    }
    if (captureCtx) {
        captureCtx.close().catch(() => {});
        captureCtx = null;
    }
    workletNode = null;
    hpFilter = null;
    updateButtonState();
}

// ═══════════════════════════════════════════
//  Listening state
// ═══════════════════════════════════════════
function startListening() {
    if (!micOpen) return;
    isListening = true;
    hasSpeech = false;
    silenceStart = 0;
    speechStartSent = false;
    sttRunning = false;

    if (!liveMode) {
        sendStartSpeech();
    }

    setStatusKey('listening');
    animateVoiceVisualTo(0.18);
    updateButtonState();
}

function stopListening() {
    if (!isListening) return;
    isListening = false;

    if (sttRunning) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'end_speech' }));
        }
        sttRunning = false;
    }
    speechStartSent = false;
    hasSpeech = false;
    silenceStart = 0;

    setStatusKey('processing');
    animateVoiceVisualTo(0.08);
    updateButtonState();
}

function sendStartSpeech() {
    if (speechStartSent) return;
    speechStartSent = true;
    sttRunning = true;
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'start_speech' }));
    }
}

// ═══════════════════════════════════════════
//  Audio chunk handler
// ═══════════════════════════════════════════
function onAudioChunk({ pcm, rms, isSpeech }) {
    if (!micOpen) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    const pct = Math.min(rms / 0.12, 1.0) * 100;
    volBar.style.width = pct + '%';
    animateVoiceVisualTo(Math.min(rms / 0.08, 1.0));

    if (!isListening && isAgentSpeaking && allowInterrupt && liveMode && isSpeech) {
        stopPlayback();
        isAgentSpeaking = false;
        currentAssistantMsg = null;
        updateButtonState();
        ws.send(pcm);
        isListening = true;
        hasSpeech = true;
        silenceStart = 0;
        speechStartSent = false;
        sttRunning = false;
        setStatusKey('listening');
        updateButtonState();
        return;
    }

    if (!isListening) return;

    const now = Date.now();

    if (liveMode) {
        if (isSpeech) {
            hasSpeech = true;
            silenceStart = 0;
            if (!speechStartSent) sendStartSpeech();
        } else if (hasSpeech) {
            if (silenceStart === 0) silenceStart = now;
            if (now - silenceStart > SILENCE_MS) {
                stopListening();
                return;
            }
        }

        if (sttRunning) ws.send(pcm);
    } else {
        ws.send(pcm);
        if (isSpeech) {
            hasSpeech = true;
            silenceStart = 0;
        } else if (hasSpeech) {
            if (silenceStart === 0) silenceStart = now;
            if (now - silenceStart > SILENCE_MS) {
                stopListening();
                closeMic();
                return;
            }
        }
    }
}

// ═══════════════════════════════════════════
//  Button state machine
// ═══════════════════════════════════════════
function updateButtonState() {
    micBtn.classList.remove('listening', 'live-connected', 'agent-speaking');
    micBtn.classList.remove('hidden');
    liveVoiceBtn.classList.remove('active', 'idle', 'listening', 'speaking');

    if (liveMode) {
        micBtn.classList.add('hidden');
        liveVoiceBtn.classList.add('active');
        if (isAgentSpeaking) {
            liveVoiceBtn.classList.add('speaking');
        } else if (isListening || micOpen) {
            liveVoiceBtn.classList.add('listening');
        } else {
            liveVoiceBtn.classList.add('idle');
        }
        return;
    }

    if (liveMode && micOpen) {
        micBtn.classList.add('live-connected');
        if (isAgentSpeaking) {
            micBtn.classList.add('agent-speaking');
        } else if (isListening) {
            micBtn.classList.add('listening');
        }
    } else if (isListening) {
        micBtn.classList.add('listening');
    }
}

// ═══════════════════════════════════════════
//  Button click handler
// ═══════════════════════════════════════════
async function handleMicControlClick() {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        initWS();
        setStatusKey('connecting');
        return;
    }

    if (faceDetectEnabled && !facePresent) {
        setStatusKey('waitFace');
        return;
    }

    if (liveMode) {
        if (!micOpen) {
            const ok = await openMic();
            if (!ok) return;
            startListening();
        } else if (isAgentSpeaking && allowInterrupt) {
            stopPlayback();
            isAgentSpeaking = false;
            ws.send(JSON.stringify({ type: 'interrupt' }));
            currentAssistantMsg = null;
            startListening();
        } else if (isAgentSpeaking && !allowInterrupt) {
            setStatusKey('waitAnswer');
        } else {
            stopListening();
            closeMic();
            setRawStatus('');
        }
    } else {
        if (isListening) {
            stopListening();
            closeMic();
        } else {
            if (isAgentSpeaking && allowInterrupt) {
                stopPlayback();
                isAgentSpeaking = false;
                ws.send(JSON.stringify({ type: 'interrupt' }));
                currentAssistantMsg = null;
            } else if (isAgentSpeaking && !allowInterrupt) {
                setStatusKey('waitAnswer');
                return;
            }
            const ok = await openMic();
            if (!ok) return;
            startListening();
        }
    }
}

micBtn.onclick = handleMicControlClick;
liveVoiceBtn.onclick = handleMicControlClick;
liveVoiceBtn.onkeydown = (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        handleMicControlClick();
    }
};

updateStaticTexts();
applyTabletMode();
applyHideChatMode();
setFaceStatus(false);
updatePersonCard();
updateButtonState();
initWS();
</script>
